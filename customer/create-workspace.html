<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Workspace | RFN Workspaces</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<header class="topbar"><div><p class="eyebrow">Workspace Verification</p><h1>Create Workspace</h1></div><a class="btn btn-outline" href="dashboard.html">Back</a></header>
<main class="main-content">
<section class="auth-card" style="max-width:700px;margin:auto">
<p class="eyebrow gold-text">Approved Customers Only</p>
<h2 style="font-size:2rem">Discord Verification</h2>
<p class="muted">Enter your approved Discord ID to verify your workspace creation permissions and linked Roblox group.</p>
<form class="form-stack" id="workspaceVerificationForm">
<div class="form-field"><label>Discord ID</label><input type="text" id="discordId" placeholder="Enter your Discord ID"></div>
<button class="btn btn-gold" type="submit">Verify Approval</button>
</form>
<div id="workspaceResult" class="message"></div>
</section>
</main>
<script type="module" src="../js/workspaces.js"></script>
</body>
</html>
