<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tickets | RFN Workspaces</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<header class="topbar"><div><p class="eyebrow">Customer Support</p><h1>Support Tickets</h1></div><a class="btn btn-outline" href="dashboard.html">Back</a></header>
<main class="main-content"><section class="auth-card" style="max-width:850px;margin:auto"><h2 style="font-size:2rem">Submit Ticket</h2><form class="form-stack" id="ticketForm"><div class="form-field"><label>Ticket Type</label><select name="ticketType"><option>General Support</option><option>Workspace Issue</option><option>Compliance Question</option><option>Appeal</option></select></div><div class="form-field"><label>Priority</label><select name="priority"><option>Low</option><option>Normal</option><option>High</option><option>Critical</option></select></div><div class="form-field"><label>Description</label><textarea name="description" rows="6" placeholder="Explain your request"></textarea></div><button class="btn btn-gold" type="submit">Submit Ticket</button></form></section></main><script type="module" src="../js/forms.js"></script>
</body>
</html>
