<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | RFN Workspaces</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow gold-text">RFN Operations Portal</p>
      <h1>Portal Login</h1>
      <p class="muted">Login to access RFN workspaces, employee operations, tickets, audits, and internships.</p>

      <form class="form-stack" id="loginForm">
        <div class="form-field">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required />
        </div>

        <button class="btn btn-gold" type="submit">Login</button>
      </form>

      <p class="message" id="message"></p>

      <div class="hero-actions">
        <a class="btn btn-outline" href="signup.html">Create Account</a>
        <a class="btn btn-outline" href="index.html">Return Home</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
